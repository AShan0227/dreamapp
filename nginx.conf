# DreamApp nginx config.
#
# HTTP listener for local dev / pre-cert deploy.
# For production, terminate TLS here too — uncomment the 443 server block
# after dropping certs into /etc/nginx/certs/ via the docker-compose
# volume mount.

# --- Common security headers (sent on all responses) ----------------------
# add_header has weird inheritance rules — using "always" so they apply
# to error responses (4xx/5xx) too.
map $sent_http_content_type $csp_policy {
    # Loose CSP for SPA + media. Tighten further once we know all asset hosts.
    default "default-src 'self'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — apply to all responses including errors
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    add_header Content-Security-Policy $csp_policy always;
    # HSTS only when behind TLS — safe to send on HTTP too with includeSubDomains? no,
    # it instructs the browser to upgrade ALL subdomain requests to HTTPS.
    # Uncomment after you have valid certs across the domain set.
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Hide nginx version
    server_tokens off;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets get long cache (filenames are content-hashed by vite)
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-emit security headers (add_header doesn't inherit into a more-specific block)
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Cap request body at 6MB — slightly above the FastAPI middleware limit
        # (5MB) so the app's 413 always wins for the actionable error message.
        client_max_body_size 6M;
    }

    # Video files served via the backend's /videos mount
    location /videos/ {
        proxy_pass http://backend:8000/videos/;
        proxy_set_header Host $host;
    }

    # Health check (unauthenticated by design)
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }
}

