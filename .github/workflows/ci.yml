name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Syntax check (every .py parses)
        run: |
          cd backend
          python -m compileall -q services routers models middleware.py main.py
      - name: Unit tests (no Postgres / no network)
        run: |
          cd backend
          pytest tests/test_payment_webhooks.py \
                 tests/test_crisis.py \
                 tests/test_moderation.py \
                 tests/test_agent_sandbox.py \
                 tests/test_quota.py \
                 tests/test_video_concat.py \
                 -v --tb=short

  migrations:
    name: Alembic migrations
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dreamapp_test
          POSTGRES_USER: dreamapp
          POSTGRES_PASSWORD: ci_test_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U dreamapp" --health-interval=5s
          --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Enable pgvector
        env:
          PGPASSWORD: ci_test_pw
        run: psql -h localhost -U dreamapp -d dreamapp_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: bootstrap schema (create_all + alembic upgrade)
        env:
          DREAM_DATABASE_URL: postgresql+asyncpg://dreamapp:ci_test_pw@localhost:5432/dreamapp_test
          DREAM_AUTH_SECRET: ci_test_only_not_secret
        run: |
          cd backend
          python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from models.dream import Base
          import models.user, models.engagement, models.threads, models.social
          import models.entities, models.knowledge_embedding, models.agent
          async def main():
              engine = create_async_engine('postgresql+asyncpg://dreamapp:ci_test_pw@localhost:5432/dreamapp_test')
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()
              print('create_all OK')
          asyncio.run(main())
          "
          alembic upgrade head
      - name: alembic upgrade head (again — idempotent)
        env:
          DREAM_DATABASE_URL: postgresql+asyncpg://dreamapp:ci_test_pw@localhost:5432/dreamapp_test
        run: |
          cd backend
          alembic upgrade head
      - name: verify head revision matches latest version file
        env:
          DREAM_DATABASE_URL: postgresql+asyncpg://dreamapp:ci_test_pw@localhost:5432/dreamapp_test
        run: |
          cd backend
          DB_REV=$(alembic current 2>&1 | grep -oE '[0-9]{4}_[a-z_]+' | head -1)
          FILE_REV=$(ls -1 alembic/versions/*.py | sed 's|.*/||;s|\.py$||' | sort | tail -1)
          echo "DB head=$DB_REV  file head=$FILE_REV"
          [ "$DB_REV" = "$FILE_REV" ] || (echo "Migration head mismatch!" && exit 1)

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build:h5